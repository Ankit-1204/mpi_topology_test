node {
  name = simple

  app1 {
    launch_cmd = aprun -n 64 -N 1
    exe = ./exp_collectives
    mpi {
      max_eager_msg_size = 16384
      smp_single_copy_size = 16384
    }
  }

  nic {
    name = pisces
    injection {
      arbitrator = cut_through
      mtu = 4096
      bandwidth = 10GB/s
      latency = 1us
      credits = 64KB
    }
  }

  memory {
    name = pisces
    total_bandwidth = 10GB/s
    latency = 15ns
    mtu = 10000000
    max_single_bandwidth = 6GB/s
  }

  proc {
    parallelism = 1.65
    frequency = 2.1Ghz
    ncores = 24
  }

  nsockets = 4
  lib_compute_unroll_loops = 1.0
}

switch {
  name = pisces
  arbitrator = cut_through
  mtu = 4096

  link {
    bandwidth = 0.8GB/s
    latency = 100ns
    credits = 64KB
  }

  xbar {
    bandwidth = 10GB/s
  }

  router {
    name = torus_minimal
  }

  logp {
    bandwidth = 2.4GB/s
    out_in_latency = 2us
    hop_latency = 100ns
  }
}

topology {
  name = torus
  geometry = [4,4,4]
  redundant = [8,4,8]
  injection_redundant = 4
  concentration = 2
}