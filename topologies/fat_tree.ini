switch {
  name = pisces
  arbitrator = cut_through
  mtu = 4096

  xbar {
    bandwidth = 10GB/s
  }

  link {
    bandwidth = 0.8GB/s
    latency = 100ns
    credits = 64KB
  }

  logp {
    bandwidth = 2.4GB/s
    out_in_latency = 2us
    hop_latency = 100ns
  }

  router {
    name = fat_tree
  }
}

topology {
  name = fat_tree

  num_core_switches = 4
  num_agg_subtrees = 2
  agg_switches_per_subtree = 4
  leaf_switches_per_subtree = 4

  down_ports_per_core_switch = 8
  up_ports_per_agg_switch = 4
  down_ports_per_agg_switch = 4
  up_ports_per_leaf_switch = 4

  concentration = 2
  output_graph = fattree4.dot
}

node {
  name = simple
  nsockets = 4

  app1 {
    launch_cmd = aprun -n 64 -N 1
    exe = ./exp_collectives
    mpi {
      max_eager_msg_size = 16384
      smp_single_copy_size = 16384
    }
  }

  memory {
    name = pisces
    total_bandwidth = 10GB/s
    latency = 15ns
    mtu = 10000000
    max_single_bandwidth = 6GB/s
  }

  nic {
    name = pisces
    injection {
      arbitrator = cut_through
      mtu = 4096
      bandwidth = 10GB/s
      latency = 1us
      credits = 64KB
    }
  }

  proc {
    parallelism = 1.65
    frequency = 2.1Ghz
    ncores = 24
  }

  lib_compute_unroll_loops = 1.0
}